    <body>
        
        <div class="floating">
        <h1> Welcome to Oversized Connections!</h1>
        
        <button type="button" id="colormode" style="" enabled onclick="themetoggle()">Toggle Site Theme</button>

        </div>


        <!-- Score: <span id="score">0</span> &nbsp; Mistakes: <span id="mistakes">0</span> &nbsp;

    </body>
    <script>
        function setcolor() {
            if (localStorage.getItem("theme") === "dark"){
                document.body.style.backgroundColor = "rgb(41, 37, 37)";
            } else {
                document.body.style.backgroundColor = "rgb(255, 240, 245)";
            }
        }
        function themetoggle() {
            if (localStorage.getItem("theme") === "dark"){
                localStorage.setItem("theme", "light");
            } else {
                localStorage.setItem("theme", "dark");
            }
            setcolor();
        }
        setcolor();
    </script>
